<nav class="breadcrumbs">
    <ol>
        {% for item in breadcrumbs %}
            <li>
                {% if not loop.last %}
                    <a href="{{ item.url }}">{{ item.title }}</a>
                {% else %}
                    <span>{{ item.title }}</span>
                {% endif %}
            </li>
        {% endfor %}
    </ol>
</nav>
